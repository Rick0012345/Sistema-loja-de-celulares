services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-celulares-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    image: node:22-alpine
    container_name: loja-celulares-backend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run start:prod"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${BACKEND_PORT}:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - scaffold
    networks:
      - app_network

  frontend:
    image: node:22-alpine
    container_name: loja-celulares-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    env_file:
      - .env
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    profiles:
      - scaffold
    networks:
      - app_network

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  app_network:
    driver: bridge
