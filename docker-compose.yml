services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-celulares-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: loja-celulares-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      target: dev
    container_name: loja-celulares-backend
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${BACKEND_PORT}:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: loja-celulares-frontend
    env_file:
      - .env
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - app_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: loja-celulares-n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      TZ: ${GENERIC_TIMEZONE}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
    ports:
      - "127.0.0.1:${N8N_PORT}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app_network

  evolution-api:
    image: ${EVOLUTION_API_IMAGE}
    container_name: loja-celulares-evolution-api
    restart: unless-stopped
    environment:
      SERVER_TYPE: ${EVOLUTION_API_SERVER_TYPE}
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_API_SERVER_URL}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_API_DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: ${EVOLUTION_API_DATABASE_CLIENT_NAME}
      CACHE_REDIS_ENABLED: ${EVOLUTION_API_CACHE_REDIS_ENABLED}
      CACHE_REDIS_URI: ${EVOLUTION_API_CACHE_REDIS_URI}
      CACHE_REDIS_PREFIX_KEY: ${EVOLUTION_API_CACHE_REDIS_PREFIX_KEY}
      CACHE_LOCAL_ENABLED: ${EVOLUTION_API_CACHE_LOCAL_ENABLED}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_AUTHENTICATION_API_KEY}
      TZ: ${GENERIC_TIMEZONE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${EVOLUTION_API_PORT}:8080"
    volumes:
      - evolution_instances_data:/evolution/instances
    networks:
      - app_network

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  n8n_data:
  redis_data:
  evolution_instances_data:

networks:
  app_network:
    driver: bridge
