services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-celulares-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      target: prod
    container_name: loja-celulares-backend-prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: loja-celulares-frontend-prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - app_network

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: loja-celulares-evolution-api-prod
    restart: unless-stopped
    environment:
      SERVER_TYPE: ${EVOLUTION_API_SERVER_TYPE}
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_API_SERVER_URL}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_API_DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: ${EVOLUTION_API_DATABASE_CLIENT_NAME}
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_AUTHENTICATION_API_KEY}
      TZ: ${GENERIC_TIMEZONE}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${EVOLUTION_API_PORT}:8080"
    volumes:
      - evolution_instances_data:/evolution/instances
    networks:
      - app_network

volumes:
  postgres_data:
  evolution_instances_data:

networks:
  app_network:
    driver: bridge
